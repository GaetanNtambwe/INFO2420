<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rent a Pet - Graphics</title>

<style type="text/css">


	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
	}

			
	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image{
		height:500px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

	var PrintButton1 = new Image ();
	var PrintButton2 = new Image ();
	var	logo1 = new Image();
	var	logo2 = new Image();
if (document.images) {
	PrintButton1.src = "Images/Hello1.gif";
	PrintButton2.src = "Images/Hello2.jpg";
	logo1.src = "Images/logo1.jpg";
	logo2.src = "Images/logo2.jpg";
}

function swapMe(thisImage,newImage){
	document.Images[thisImage].src= eval(newImage + ".src");
}


		var imgArray = new Array(
			'CatandDogLg.jpg',
			'DogTrick2Lg.jpg',
			'HuntingDogsLg.jpg',
			'BirdDogLg.jpg'
			

		);


		var titleArray = new Array(
			'Cuddling Pet',
			'Dog Performing a Trick',
			'Super Dog',
			'Pet Friendship'
			
		);
			
		var imgPath = "Images/Fullsize/";
		
		function swapImage(imgID) {

			var theImage = document.getElementById('theImage');
			var textDiv = document.getElementById('bottomText');

			var newImg;
			var textTitle;

			newImg = imgArray[imgID];
			theImage.src = imgPath + newImg;

			textTitle=titleArray[imgID];

      			textDiv.innerHTML = textTitle;
		}
			
		function preloadImages() {		
			for(var i = 0; i < imgArray.length; i++) {
				var tmpImg = new Image;
				tmpImg.src = imgPath + imgArray[i];
			}
		}
		

</script>


</head>

</body>
<body  onload="preloadImages()">

<div align="center">

<div>
	<a href="" onMouseOver="document.PrintButton.src=PrintButton2.src;"
	onMouseOut="document.PrintButton.src=PrintButton1.src;">

	<img src="Images/Hello1.gif" width="250" height="50" 
	name="PrintButton" alt="PrintButton" style="border:none;"/>

	</a>
</div>


<div id="logo">
	<a href="logo.html" onMouseOver="document.logo.src=logo2.src;"
	onMouseOut="document.logo.src=logo1.src;">

	<img src="Images/logo1.jpg" width="133" height="126" 
	name="logo" alt="logo" style="border:none;"/>

	</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
		<img src="Images/Thumbnails/CatandDogLg.jpg" alt="Dog" onmouseover="swapImage(0);" />
		<img src="Images/Thumbnails/DogTrick2Lg.jpg" alt="Dog doing trick" onmouseover="swapImage(1);"/>
		<img src="Images/Thumbnails/HuntingDogsLg.jpg" alt="Super Dog" onmouseover="swapImage(2);"/>
		<img src="Images/Thumbnails/BirdDogLg.jpg" alt="Pet Friendship" onmouseover="swapImage(3);" />		
</div>

	<div id="image">

		<img id="theImage" src="Images/Fullsize/DogTrick2Lg.jpg" alt="Dog doing trick;" />
		<h3 id="bottomText">Newlyweds Sailing</h3>
	</div>

<img src="Images/Banner1..jpg">
